version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gympro-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/gym_management
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRE: 15m
      JWT_REFRESH_EXPIRE: 7d
      CLIENT_URL: http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped
    networks:
      - gympro-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gympro-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gympro-network
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: gympro-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gympro-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gympro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gympro-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: gympro-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - gympro-network
    profiles:
      - dev

volumes:
  mongo_data:
  redis_data:

networks:
  gympro-network:
    driver: bridge
